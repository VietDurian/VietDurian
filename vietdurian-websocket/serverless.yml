# serverless.yml
service: vietdurian-websocket

provider:
  name: aws
  runtime: nodejs24.x
  region: ap-southeast-1
  environment:
    CONNECTIONS_TABLE: ${self:service}-connections-${sls:stage}
    STAGE: ${sls:stage}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:DeleteItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:Query
            - dynamodb:UpdateItem
          Resource:
            - !GetAtt ConnectionsTable.Arn
            - !Sub "${ConnectionsTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - execute-api:ManageConnections
          Resource:
            - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*"

functions:
  connect:
    handler: handlers/connect.handler
    events:
      - websocket:
          route: $connect
          authorizer:
            name: wsAuthorizer
            identitySources:
              - route.request.querystring.token

  disconnect:
    handler: handlers/disconnect.handler
    events:
      - websocket:
          route: $disconnect

  default:
    handler: handlers/default.handler
    events:
      - websocket:
          route: $default

  sendMessage:
    handler: handlers/sendMessage.handler
    events:
      - websocket:
          route: sendMessage

  getOnlineUsers:
    handler: handlers/getOnlineUsers.handler
    events:
      - websocket:
          route: getOnlineUsers

  wsAuthorizer:
    handler: handlers/authorizer.handler

resources:
  Resources:
    ConnectionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CONNECTIONS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: connectionId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: connectionId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: userId-index
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true


plugins:
  - serverless-offline